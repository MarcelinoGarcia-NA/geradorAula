<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Gerador de Plano de Aula</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.steps {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  text-align: center;
}

.step {
  flex: 1;
}

.step-circle {
  width: 35px;
  height: 35px;
  background: #6c5ce7;
  color: white;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 5px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.row {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
}

.col {
  flex: 1;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  margin-top: 5px;
}

textarea {
  resize: vertical;
}

button {
  width: 100%;
  padding: 15px;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.resultado-container {
  display: none;
  gap: 20px;
}

.resultado-left {
  flex: 1.2;
}

.resultado-right {
  flex: 1;
}

.plano-box {
  background: #fafafa;
  padding: 15px;
  border-radius: 8px;
  max-height: 600px;
  overflow-y: auto;
  border: 1px solid #eee;
}

.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.metric {
  background: #fafafa;
  border: 1px solid #eee;
  padding: 12px;
  border-radius: 10px;
}

.metric-title {
  font-weight: 600;
  margin-bottom: 8px;
  color: #333;
}

/* escala */
.scale {
  display: flex;
  justify-content: space-between;
  gap: 6px;
}

.scale label {
  flex: 1;
  text-align: center;
  padding: 8px 0;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid #ddd;
  background: white;
  transition: 0.2s;
  font-size: 14px;
}

.scale input {
  display: none;
}

/* estado selecionado */
.scale input:checked + label {
  background: #6c5ce7;
  color: white;
  border-color: #6c5ce7;
}
label {
  display: block;
  margin-top: 10px;
  margin-bottom: 5px;
  font-weight: 500;
}

input,
textarea,
select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  margin-bottom: 14px; /* 🔥 aqui resolve o “colado” */
  box-sizing: border-box;
}

.aula {
  background: white;
  border-left: 6px solid #6c5ce7;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.aula h2 {
  margin-top: 0;
  color: #6c5ce7;
}

h4 {
  margin-bottom: 5px;
  color: #333;
}
</style>
</head>

<body>

<div class="container">

<div class="steps">
  <div class="step"><div class="step-circle">1</div>Dados</div>
  <div class="step"><div class="step-circle">2</div>IA</div>
  <div class="step"><div class="step-circle">3</div>Resultado</div>
  <div class="step"><div class="step-circle">4</div>Avaliação</div>
</div>

<form id="form">

<div class="card">

<h3>Configuração</h3>

<div class="row">
  <div class="col">
    <label>Disciplina</label>
    <input name="disciplina" placeholder="Ex: Programação Orientada a Objetos" required>
  </div>

  <div class="col">
    <label>Curso</label>
    <input name="curso" placeholder="Ex: Ciência da Computação" required>
  </div>
</div>

<div class="row">
  <div class="col">
    <label>Carga Horária</label>
    <input name="carga" placeholder="Ex: 60h">
  </div>

  <div class="col">
    <label>Número de Aulas</label>
    <input name="qtd_aulas" placeholder="Ex: 16" value="16">
  </div>

  <div class="col">
    <label>Duração por Aula</label>
    <input name="duracao" placeholder="Ex: 2h">
  </div>
</div>

<label>Ementa</label>
<textarea name="ementa" placeholder="Ex: Classes, objetos, encapsulamento, herança, polimorfismo, LINQ..."></textarea>

<label>Objetivo</label>
<textarea name="objetivo" placeholder="Ex: Desenvolver sistemas utilizando POO em C#"></textarea>

<!-- ✅ INPUT DE ARQUIVO -->
<label>Arquivo PDF (opcional)</label>
<input type="file" name="arquivo" accept="application/pdf">

<label>Modelo de IA</label>
<select name="ia">
  <option value="gpt">GPT</option>
  <option value="claude">Claude</option>
</select>

<br><br>

<button type="submit">🚀 Gerar Plano</button>

</div>

</form>

<div id="resultado" class="resultado-container">

<div class="resultado-left card">
<h3>Plano Gerado</h3>
<div id="conteudo" class="plano-box"></div>
</div>

<div class="resultado-right card">
<h3>Avaliação</h3>

<input id="nomeProfessor" placeholder="Nome do professor">

<div class="metric">
    <div class="metric-title">Capacidade</div>
    <div class="scale">
      <input type="radio" name="capacidade" id="c1" onclick="av.capacidade=1"><label for="c1">1</label>
      <input type="radio" name="capacidade" id="c2" onclick="av.capacidade=2"><label for="c2">2</label>
      <input type="radio" name="capacidade" id="c3" onclick="av.capacidade=3"><label for="c3">3</label>
      <input type="radio" name="capacidade" id="c4" onclick="av.capacidade=4"><label for="c4">4</label>
      <input type="radio" name="capacidade" id="c5" onclick="av.capacidade=5"><label for="c5">5</label>
    </div>
  </div>

  <!-- Diversidade -->
  <div class="metric">
    <div class="metric-title">Diversidade</div>
    <div class="scale">
      <input type="radio" name="diversidade" id="d1" onclick="av.diversidade=1"><label for="d1">1</label>
      <input type="radio" name="diversidade" id="d2" onclick="av.diversidade=2"><label for="d2">2</label>
      <input type="radio" name="diversidade" id="d3" onclick="av.diversidade=3"><label for="d3">3</label>
      <input type="radio" name="diversidade" id="d4" onclick="av.diversidade=4"><label for="d4">4</label>
      <input type="radio" name="diversidade" id="d5" onclick="av.diversidade=5"><label for="d5">5</label>
    </div>
  </div>

  <!-- Complexidade -->
  <div class="metric">
    <div class="metric-title">Complexidade</div>
    <div class="scale">
      <input type="radio" name="complexidade" id="co1" onclick="av.complexidade=1"><label for="co1">1</label>
      <input type="radio" name="complexidade" id="co2" onclick="av.complexidade=2"><label for="co2">2</label>
      <input type="radio" name="complexidade" id="co3" onclick="av.complexidade=3"><label for="co3">3</label>
      <input type="radio" name="complexidade" id="co4" onclick="av.complexidade=4"><label for="co4">4</label>
      <input type="radio" name="complexidade" id="co5" onclick="av.complexidade=5"><label for="co5">5</label>
    </div>
  </div>

  <!-- Relevância -->
  <div class="metric">
    <div class="metric-title">Relevância</div>
    <div class="scale">
      <input type="radio" name="relevancia" id="r1" onclick="av.relevancia=1"><label for="r1">1</label>
      <input type="radio" name="relevancia" id="r2" onclick="av.relevancia=2"><label for="r2">2</label>
      <input type="radio" name="relevancia" id="r3" onclick="av.relevancia=3"><label for="r3">3</label>
      <input type="radio" name="relevancia" id="r4" onclick="av.relevancia=4"><label for="r4">4</label>
      <input type="radio" name="relevancia" id="r5" onclick="av.relevancia=5"><label for="r5">5</label>
    </div>
  </div>

<br>

<label>
Comentários
</label>

<textarea placeholder="Observações..." onchange="av.observacoes=this.value"></textarea>

<button type="button" onclick="salvar()">📊 Salvar Avaliação</button>

</div>

</div>

</div>

<script>
let av = {
  fluidez:0,
  capacidade:0,
  diversidade:0,
  complexidade:0,
  relevancia:0,
  incompleta:false,
  observacoes:""
};

document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const resultado = document.getElementById("resultado");
  const conteudo = document.getElementById("conteudo");

  resultado.style.display = "flex";
  conteudo.innerHTML = "⏳ Gerando plano...<br><br>";

  const formData = new FormData(this);

  const response = await fetch("/gerar", {
    method: "POST",
    body: formData
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder();

  conteudo.innerHTML = "";

  let buffer = "";

function formatarPlano(texto) {
  return texto
    .replace(/=== AULA (\d+) ===/g, `
      </div>
      <div class="aula">
        <h2>📘 Aula $1</h2>
    `)

    .replace(/Conteúdo:/g, "<h4>📌 Conteúdo</h4>")
    .replace(/Recursos didáticos:/g, "<h4>📚 Recursos didáticos</h4>")
    .replace(/Livro:/g, "<h4>📖 Livro</h4>")
    .replace(/Capítulo:/g, "<h4>📘 Capítulo</h4>")
    .replace(/Metodologia:/g, "<h4>🧠 Metodologia</h4>")
    .replace(/Atividade:/g, "<h4>🛠 Atividade</h4>")
    .replace(/Avaliação:/g, "<h4>🧾 Avaliação</h4>")
    .replace(/\n/g, "<br>");
}

while (true) {
  const { done, value } = await reader.read();
  if (done) break;

  buffer += decoder.decode(value);

  conteudo.innerHTML = formatarPlano(buffer);
}
});

async function salvar(){

  const nome = document.getElementById("nomeProfessor").value;

  const total = Number(av.fluidez)+Number(av.capacidade)+Number(av.diversidade)+Number(av.complexidade)+Number(av.relevancia);
  const media = (total/5).toFixed(2);

  const dados = {
    professor: nome,
    questao: 1,
    fluidez: av.fluidez,
    capacidade: av.capacidade,
    diversidade: av.diversidade,
    complexidade: av.complexidade,
    relevancia: av.relevancia,
    media: media,
    incompleta: av.incompleta ? "Sim":"Não",
    observacoes: av.observacoes
  };

  // pega plano gerado da tela
 const plano = document.getElementById("conteudo").innerText;

  const payload = {
    plano: plano,
    avaliacao: dados,
    formulario: {
      disciplina: document.querySelector("[name=disciplina]").value,
      curso: document.querySelector("[name=curso]").value,
      carga: document.querySelector("[name=carga]").value,
      qtd_aulas: document.querySelector("[name=qtd_aulas]").value
    }
  };

  const res = await fetch("/download_plano", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });

  const blob = await res.blob();

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "plano_completo.zip";
  link.click();
}

</script>

</body>
</html>
